apiVersion: v1
kind: Secret
metadata:
  name: bounty-pay-secrets
  labels:
    app: bounty-pay
type: Opaque
stringData:
  # ── Session ──────────────────────────────────────────
  # Generate with: openssl rand -hex 32
  SESSION_SECRET: "REPLACE_ME"

  # ── MySQL ────────────────────────────────────────────
  MYSQL_PASSWORD: "REPLACE_ME"

  # ── GitHub App ───────────────────────────────────────
  GITHUB_CLIENT_SECRET: "REPLACE_ME"
  GITHUB_TOKEN: "REPLACE_ME"
  GITHUB_WEBHOOK_SECRET: "REPLACE_ME"
  # base64-encoded PEM: cat your-app.pem | base64 | tr -d '\n'
  GITHUB_APP_PRIVATE_KEY_BASE64: "REPLACE_ME"

  # ── AI / Inference ──────────────────────────────────
  INFER_API_KEY: "REPLACE_ME"
  OPENAI_API_KEY: "REPLACE_ME"

  # ── Lark ────────────────────────────────────────────
  LARK_APP_SECRET: "REPLACE_ME"
  LARK_CALLBACK_SECRET: "REPLACE_ME"

  # ── Meegle ──────────────────────────────────────────
  MEEGLE_MCP_TOKEN: "REPLACE_ME"
  MEEGLE_WEBHOOK_SECRET: "REPLACE_ME"

  # ── On-chain Payout ─────────────────────────────────
  # Private key for the platform payout wallet
  PLATFORM_PAYOUT_PRIVATE_KEY: "REPLACE_ME"

  # ── Payout Retry Cron ───────────────────────────────
  PAYOUT_RETRY_CRON_SECRET: "REPLACE_ME"
